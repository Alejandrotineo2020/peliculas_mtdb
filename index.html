<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHub | Alejandro Tineo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-main text-light">

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top bg-dark-glass">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="#">MOVIE<span class="text-white">HUB</span></a>
            
            <div class="d-flex position-relative w-50">
                <input id="searchInput" class="form-control form-control-sm bg-dark text-white border-secondary" type="search" placeholder="Buscar película..." autocomplete="off">
                <div id="autocompleteResults" class="autocomplete-box"></div>
            </div>
        </div>
    </nav>

    <header class="container mt-5">
        <h1 class="text-center display-5 fw-bold mb-4">Estrenos <span class="text-warning">Para Hoy</span></h1>
    </header>

    <main class="container">
        <div id="moviesGrid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
            </div>

        <nav class="mt-5">
            <ul class="pagination justify-content-center">
                <li class="page-item"><button class="page-link bg-dark text-white border-secondary" id="prevPage">Anterior</button></li>
                <li class="page-item disabled"><span class="page-link bg-dark text-warning border-secondary" id="pageIndicator">1</span></li>
                <li class="page-item"><button class="page-link bg-dark text-white border-secondary" id="nextPage">Siguiente</button></li>
            </ul>
        </nav>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
